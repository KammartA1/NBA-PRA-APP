name: NBA Scanner Worker

# All-sports pre-game coverage. PrizePicks props LOCK at event start, so the
# valuable window is BEFORE games — and across sports that's a wide band:
#   - PGA tee times start ~6:30am ET (early morning)
#   - MLB day games ~1pm ET
#   - NBA/NHL/WNBA/MLB evening slate ~7pm ET
#   - Late West Coast games end ~1am ET
# GitHub cron is always UTC (no DST). ET is UTC-4 (summer) / UTC-5 (winter),
# so the window is intentionally wide to cover both. Hourly minimum, with
# every-30-min coverage during the evening prime pre-game window.
# (Repo is public -> Actions minutes are unlimited/free.)

on:
  schedule:
    # Hourly, 10:00-23:00 UTC  (~6am-7pm ET) — morning golf through evening tip
    - cron: "0 10-23 * * *"
    # Hourly, 00:00-06:00 UTC  (~8pm-1am ET) — night + late West Coast games
    - cron: "0 0-6 * * *"
    # Every-30 boost during evening prime (21:00-23:30 UTC ~ 5-7pm ET)
    - cron: "30 21,22,23 * * *"
    # Every-30 boost 00:30-02:30 UTC (~8-10pm ET)
    - cron: "30 0,1,2 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "scan"
        type: choice
        options:
          - scan
          - setup-db
          - test-all
          - test-pp
          - test-db
          - test-notify

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nba_api MLB-StatsAPI pandas numpy scipy requests supabase psycopg2-binary

      - name: Run
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MODE="${{ github.event.inputs.mode || 'scan' }}"
          case "$MODE" in
            setup-db)
              python -m core.setup_db
              ;;
            scan)
              python -m core.scanner_worker
              ;;
            *)
              python -m core.scanner_worker --$MODE
              ;;
          esac
